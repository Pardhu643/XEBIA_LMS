# Server
server.port=${PORT:8080}

# MongoDB Configuration - URI is injected via MONGODB_URI environment variable
# spring.data.mongodb.uri=mongodb://localhost:27017/employeeDB
spring.mongodb.embedded.version=4.0.2
spring.data.mongodb.port=27017
spring.data.mongodb.database=employeeDB

# Jackson - exclude null fields from JSON responses
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.assessmentportal=INFO
